services:

# OTel Collector - receives telemetry pushed from Claude Code clients
# and routes metrics to Prometheus and logs to Loki
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.156.0@sha256:125bdbeb7590cc1952c5b3430ecf14063568980c2c93d5b38676cc0446ed8108
    user: "10001"
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    # 4317 (gRPC) stays public for direct gRPC clients. 4318 (HTTP) is bound to
    # loopback — external HTTP OTLP goes through Caddy TLS at /v1/* -> 4318.
    # 8889 (Prometheus exporter) is scraped over the docker network, not published.
    ports: ["4317:4317", "127.0.0.1:4318:4318"]
    restart: unless-stopped
    # Shared ingest token for OTLP bearer-token auth (see .env / .env.example).
    # :? fails fast so the collector never starts with auth effectively disabled.
    environment:
      - OTEL_INGEST_TOKEN=${OTEL_INGEST_TOKEN:?set OTEL_INGEST_TOKEN in .env}
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
    networks:
      - ingestion
      - backend
    depends_on: [prometheus, loki]

# Prometheus - scrapes metrics from the OTel Collector and stores them
# Grafana queries Prometheus to visualize this data

  prometheus:
    image: prom/prometheus:v3.13.1@sha256:3c42b892cf723fa54d2f262c37a0e1f80aa8c8ddb1da7b9b0df9455a35a7f893
    user: "nobody"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    # 9090 is queried by Grafana over the docker network and is NOT published to
    # the host. For VM-local debugging use `docker compose exec prometheus ...`.
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=30d
      - --storage.tsdb.retention.size=10GB
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    networks:
      - backend

# Loki - receives log data pushed from the OTel Collector and stores it
# Grafana queries Loki to visualize this data
  loki:
    image: grafana/loki:3.7.3@sha256:70b9f699fc9bb868b62f1cfd4f787dfa50242f1fd92e6089787d5d7daea75fe8
    user: "10001"
    # Reached by the collector (push) and Grafana (query) over the docker
    # network; NOT published to the host.
    volumes:
      - loki_data:/loki
      - ./loki-config.yaml:/etc/loki/local-config.yaml:ro
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    networks:
      - backend

# Grafana - dashboard UI that queries both Prometheus and Loki
# to visualize usage, code acceptance rates, and cost
  grafana:
    image: grafana/grafana:13.1.0@sha256:121a7a9ece6dc10b969f1f96eed64b4f07dfac0d0b8abc070f7cb83bbde86f63
    user: "472"
    # Loopback only — Grafana is reached externally via Caddy TLS (telemetry.edgebeam.dev).
    ports: ["127.0.0.1:3000:3000"]
    volumes:
       - grafana_data:/var/lib/grafana
       - ./provisioning/:/etc/grafana/provisioning:ro
    restart: unless-stopped
    # :? fails fast if unset — otherwise Grafana silently falls back to admin/admin.
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:?set a strong Grafana admin password in .env}
      - GF_SERVER_ROOT_URL=https://telemetry.edgebeam.dev
      - GF_SECURITY_COOKIE_SECURE=true
      - GF_SECURITY_STRICT_TRANSPORT_SECURITY=true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
    networks:
      - frontend
      - backend
    depends_on: [prometheus, loki]

# Caddy - public TLS reverse proxy (Let's Encrypt). Terminates HTTPS for
# telemetry.edgebeam.dev and proxies /v1/* -> otel-collector:4318, else grafana:3000.
  caddy:
    image: caddy:2-alpine
    user: "1000"
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_certs:/config
    networks:
      - frontend
      - ingestion
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    read_only: true
    tmpfs:
      - /tmp
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'
    depends_on: [grafana, otel-collector]

# Segmented networks: only grafana is on frontend, only otel-collector is on
# ingestion; backend carries all inter-service traffic (Grafana<->Prom/Loki,
# Prom-scrape->collector, collector-push->Loki). Caddy bridges frontend+ingestion.
networks:
  frontend:
  ingestion:
  backend:

volumes:
  prometheus_data:
  loki_data:
  grafana_data:
  caddy_data:
  caddy_certs:
